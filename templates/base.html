<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>{% block title %}Neorise FSL{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-bright": "#f9f9ff",
            "on-surface-variant": "#4a4455",
            "inverse-primary": "#d2bbff",
            "surface-container-highest": "#dce2f3",
            "secondary": "#006a61",
            "secondary-fixed-dim": "#6bd8cb",
            "surface": "#f9f9ff",
            "on-primary-container": "#ede0ff",
            "secondary-fixed": "#89f5e7",
            "secondary-container": "#86f2e4",
            "inverse-on-surface": "#ebf1ff",
            "surface-tint": "#732ee4",
            "surface-container-lowest": "#ffffff",
            "on-error": "#ffffff",
            "error-container": "#ffdad6",
            "inverse-surface": "#2a313d",
            "on-secondary": "#ffffff",
            "primary": "#630ed4",
            "on-primary": "#ffffff",
            "on-background": "#151c27",
            "surface-container-high": "#e2e8f8",
            "tertiary": "#922800",
            "tertiary-container": "#b83b0e",
            "on-tertiary": "#ffffff",
            "on-tertiary-container": "#ffded5",
            "surface-dim": "#d3daea",
            "on-surface": "#151c27",
            "surface-container": "#e7eefe",
            "on-error-container": "#93000a",
            "surface-container-low": "#f0f3ff",
            "on-primary-fixed-variant": "#5a00c6",
            "background": "#f9f9ff",
            "on-secondary-container": "#006f66",
            "on-primary-fixed": "#25005a",
            "tertiary-fixed": "#ffdbd0",
            "tertiary-fixed-dim": "#ffb59f",
            "error": "#ba1a1a",
            "outline-variant": "#ccc3d8",
            "primary-fixed-dim": "#d2bbff",
            "outline": "#7b7487",
            "primary-container": "#7c3aed",
            "primary-fixed": "#eaddff",
          },
          fontFamily: {
            "headline": ["Inter", "sans-serif"],
            "body":     ["Inter", "sans-serif"],
          },
          borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
        },
      },
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
    }
    {% block extra_style %}{% endblock %}
  </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">

  <!-- TopNavBar -->
  <header class="bg-white/80 backdrop-blur-xl sticky top-0 z-50 shadow-sm">
    <div class="flex justify-between items-center w-full px-14 py-3 max-w-screen-2xl mx-auto">
      <div class="flex items-center gap-8">
        <a href="{% url 'dashboard' %}" class="text-xl font-bold tracking-tighter text-violet-700">Neorise FSL</a>
        <nav class="hidden md:flex items-center gap-6 font-sans text-sm font-medium tracking-tight">
          <a class="{% if request.resolver_match.url_name == 'dashboard' %}text-violet-700 font-semibold border-b-2 border-violet-600 pb-1{% else %}text-slate-600 hover:text-slate-900 transition-colors{% endif %}" href="{% url 'dashboard' %}">Dashboard</a>
          <a class="{% if 'project' in request.resolver_match.url_name %}text-violet-700 font-semibold border-b-2 border-violet-600 pb-1{% else %}text-slate-600 hover:text-slate-900 transition-colors{% endif %}" href="{% url 'dashboard' %}">Projects</a>
          <a class="text-slate-600 hover:text-slate-900 transition-colors" href="#">Framework</a>
          <a class="text-slate-600 hover:text-slate-900 transition-colors" href="#">Settings</a>
        </nav>
      </div>
      <div class="flex items-center gap-4">
        <div class="flex items-center bg-slate-100 rounded-lg px-3 py-1.5 gap-2">
          <span class="material-symbols-outlined text-slate-500 text-sm">search</span>
          <input class="bg-transparent border-none focus:ring-0 text-sm w-48" placeholder="Search curriculum..." type="text">
        </div>
        <button class="p-2 hover:bg-slate-100 rounded-lg transition-colors">
          <span class="material-symbols-outlined text-slate-600">notifications</span>
        </button>
        <div class="flex items-center gap-3 pl-4 border-l border-slate-200">
          <div class="text-right hidden sm:block">
            <p class="text-xs font-semibold text-on-surface">Admin</p>
            <p class="text-[10px] text-slate-500">Neorise Team</p>
          </div>
          <div class="w-8 h-8 rounded-full bg-primary-container text-white flex items-center justify-center text-xs font-bold">N</div>
        </div>
      </div>
    </div>
  </header>

  <main class="{% block main_class %}flex-grow max-w-screen-2xl mx-auto w-full px-14 py-10{% endblock %}">
    {% block content %}{% endblock %}
  </main>

  {% block extra_js %}{% endblock %}
</body>
</html>
